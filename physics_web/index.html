<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gellow Physics Web</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="stage" id="stage">
      <canvas id="physics-canvas" aria-label="Gellow physics navigation"></canvas>

      <header class="topbar">
        <a class="brand" href="./" aria-label="Gellow home">gellow.top</a>
        <span class="status" id="status">PHYSICS NAV / READY</span>
        <div class="toolbox" aria-label="Physics controls">
          <button type="button" data-action="shake" title="Shake shapes">SHAKE</button>
          <button type="button" data-action="reset" title="Reset shapes">RESET</button>
        </div>
      </header>

      <div class="cup-caption" aria-hidden="true">DROP</div>
      <section class="window-layer" id="window-layer" aria-live="polite"></section>
      <noscript>This demo needs JavaScript enabled.</noscript>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="js/physics-module.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
