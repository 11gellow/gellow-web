<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gellow Notes Console</title>
        <meta
            name="description"
            content="Notes console article archive for managing blog posts."
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../assets/favicon-notes.svg"
        />
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="stylesheet" href="./css/style.css" />
        <script defer src="../js/boot.js"></script>
    </head>
    <body>
        <div class="page-loader" id="page-loader">
            <div class="loader-shell pixel">
                <div class="loader-marquee">Insert Coin To Load</div>
                <div class="loader-core">
                    <div class="loader-glyph loader-glyph-notes">N</div>
                    <div class="loader-copy">
                        <strong>Notes Console</strong>
                        <p>loading~~~</p>
                        <div class="loader-bar"><span></span></div>
                    </div>
                </div>
            </div>
        </div>

        <header class="notes-minibar">
            <div class="wrap notes-minibar-inner">
                <a
                    class="btn btn-notes-hub"
                    href="../index.html"
                    data-toast-message="Blog Home 已打开"
                    >Back To Blog</a
                >
            </div>
        </header>

        <main class="wrap notes-archive-shell">
            <section class="notes-side pixel">
                <div class="notes-panel-head notes-archive-head">
                    <div>
                        <div class="notes-panel-kicker">Post Index</div>
                        <h1 class="section-title yellow">Article List</h1>
                    </div>
                    <a
                        class="btn btn-green"
                        href="./editor.html?mode=new"
                        data-toast-message="Post Editor 已打开"
                        >New Post</a
                    >
                </div>
                <p class="notes-hint notes-archive-status" id="archive-status">
                    正在读取文章列表...
                </p>
                <div class="article-grid article-grid-archive" id="article-list"></div>
            </section>
        </main>

        <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="false"></div>

        <script src="../js/content-api.js"></script>
        <script src="../js/feedback.js"></script>
        <script src="./js/main.js"></script>
    </body>
</html>
