<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gellow Blog</title>
        <link rel="icon" type="image/png" href="./assets/favicon.png" />
        <link rel="stylesheet" href="./css/style.css" />
        <script defer src="./js/boot.js"></script>
    </head>
    <body>
        <div class="page-loader" id="page-loader">
            <div class="loader-shell pixel">
                <div class="loader-marquee">Insert Coin To Load</div>
                <div class="loader-core">
                    <div class="loader-glyph loader-glyph-blog">B</div>
                    <div class="loader-copy">
                        <strong>Booting Blog</strong>
                        <p>正在装载文章流。</p>
                        <div class="loader-bar"><span></span></div>
                    </div>
                </div>
            </div>
        </div>

        <header class="fusion-header home-header-style">
            <div class="wrap fusion-nav">
                <div class="brand-block">
                    <div class="identity-card pixel">
                        <img
                            class="avatar"
                            src="./assets/KindGellow.png"
                            alt="Profile avatar"
                        />
                        <div class="identity-meta">
                            <div class="presence-line">
                                <span class="online-dot" aria-hidden="true"></span>
                                online
                            </div>
                            <div class="username">KindGellow</div>
                        </div>
                    </div>
                    <div class="brand-copy">
                        <h1 class="title">Gellow Blog</h1>
                        <div class="subtitle">Insert Coin To Read</div>
                    </div>
                </div>
            </div>
        </header>

        <button
            class="pacman-launch-button"
            id="pacman-launch-button"
            type="button"
            aria-label="Open Pac-Man"
        >
            <img src="./assets/pacman.png" alt="" />
        </button>

        <aside class="bookmark-dock" aria-label="Quick bookmarks">
            <a
                class="bookmark-tab"
                href="https://github.com/11gellow"
                target="_blank"
                rel="noopener noreferrer"
                data-toast-message="GitHub 已打开"
            >
                <span class="bookmark-icon">
                    <img src="https://github.githubassets.com/favicons/favicon-dark.svg" alt="GitHub" />
                </span>
                <span class="bookmark-preview">
                    <strong>GitHub</strong>
                </span>
            </a>
            <a
                class="bookmark-tab"
                href="https://steamcommunity.com/profiles/76561198444114302/"
                target="_blank"
                rel="noopener noreferrer"
                data-toast-message="Steam 已打开"
            >
                <span class="bookmark-icon">
                    <img src="https://store.steampowered.com/favicon.ico" alt="Steam" />
                </span>
                <span class="bookmark-preview">
                    <strong>Steam</strong>
                </span>
            </a>
            <a
                class="bookmark-tab"
                href="https://space.bilibili.com/518863790"
                target="_blank"
                rel="noopener noreferrer"
                data-toast-message="Bilibili 已打开"
            >
                <span class="bookmark-icon">
                    <img src="https://www.bilibili.com/favicon.ico" alt="Bilibili" />
                </span>
                <span class="bookmark-preview">
                    <strong>Bilibili</strong>
                </span>
            </a>
        </aside>

        <div class="game-window" id="game-window" hidden>
            <div class="game-window-shell pixel">
                <div class="game-window-head" id="game-window-handle">
                    <div>
                        <h2>Pac-Man Run</h2>
                    </div>
                    <button
                        class="game-window-close"
                        id="game-window-close"
                        type="button"
                        aria-label="Close Pac-Man"
                        data-toast-message="Pac-Man Arcade 已关闭"
                    >
                        ×
                    </button>
                </div>
                <div class="game-window-body">
                    <iframe
                        id="game-window-frame"
                        title="Pac-Man Arcade"
                        loading="lazy"
                    ></iframe>
                </div>
            </div>
        </div>

        <div class="password-modal" id="notes-password-modal" hidden>
            <div class="password-modal-shell pixel" role="dialog" aria-modal="true" aria-labelledby="notes-password-title">
                <div class="password-modal-head">
                    <h2 id="notes-password-title">Notes Access</h2>
                    <button
                        class="password-modal-close"
                        id="notes-password-close"
                        type="button"
                        aria-label="Close password dialog"
                        data-toast-message="Notes Access 已关闭"
                    >
                        ×
                    </button>
                </div>
                <form class="password-form" id="notes-password-form">
                    <label class="password-field" for="notes-password-input">Password</label>
                    <input
                        id="notes-password-input"
                        name="password"
                        type="password"
                        autocomplete="off"
                        required
                    />
                    <p class="password-error" id="notes-password-error" hidden>密码错误</p>
                    <div class="password-actions">
                        <button class="btn btn-yellow" type="submit" data-toast-defer>Enter Notes</button>
                        <button class="btn btn-red" id="notes-password-cancel" type="button" data-toast-message="Notes Access 已关闭">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <main class="wrap fusion-shell">
            <section class="post-stream" id="post-stream">
                <div class="stream-head">
                    <h2>Post Stream</h2>
                </div>
                <div class="stream-list" id="stream-list">
                    <article class="loading-card pixel">正在加载文章流...</article>
                </div>
            </section>
        </main>

        <footer class="fusion-footer">Gellow Blog · Stream view</footer>

        <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="false"></div>

        <script src="./js/content-api.js"></script>
        <script src="./js/feedback.js"></script>
        <script src="./js/main.js"></script>
    </body>
</html>
