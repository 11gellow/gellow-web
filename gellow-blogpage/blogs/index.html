<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Blog Entries</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header>
    <div class="wrap nav">
      <div>
        <h1 class="title">All Blog Entries</h1>
        <div class="subtitle">Full Archive View</div>
      </div>
      <nav class="menu">
        <a class="btn btn-red" href="../index.html#latest">Back To Blog</a>
        <a class="btn btn-red" href="../notes/">Open Notes</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <h2 class="section-title yellow">Archive</h2>
      <div class="archive-shell">
        <div class="archive-head">
          <p class="archive-copy">
            这里收纳所有已发布的 blog。首页的 Latest Entries 只展示 3 篇，这里会完整列出。
          </p>
          <a class="btn btn-blue" href="../index.html#latest">Return To Latest</a>
        </div>
        <div id="all-posts"></div>
      </div>
    </section>
  </main>

  <footer>
    Gellow Blog · Full archive view
  </footer>

  <script src="../js/content-api.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
