<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon-blog.svg" />
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/boot.js"></script>
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-shell pixel">
      <div class="loader-marquee">Insert Coin To Load</div>
      <div class="loader-core">
        <div class="loader-glyph loader-glyph-post">P</div>
        <div class="loader-copy">
          <strong>Loading Post</strong>
          <p>正在装载正文、摘要和像素阅读页。</p>
          <div class="loader-bar"><span></span></div>
        </div>
      </div>
    </div>
  </div>
  <header>
    <div class="wrap nav">
      <div>
        <h1 class="title">Post Detail</h1>
        <div class="subtitle">Read The Full Entry</div>
      </div>
      <div class="nav-actions">
        <nav class="menu">
          <a class="btn btn-red" href="../index.html#latest">Back To Blog</a>
          <a class="btn btn-red" href="./index.html">All Blog</a>
        </nav>
        <a class="btn btn-notes-hub" href="../notes/">Open Notes</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <h2 class="section-title yellow">Full Post</h2>
      <article class="post-detail pixel" id="post-detail">
        <div class="loading-card">正在加载文章...</div>
      </article>
    </section>
  </main>

  <footer>
    Gellow Blog · Detail page
  </footer>

  <script src="../js/content-api.js"></script>
  <script src="./js/post.js"></script>
</body>
</html>
